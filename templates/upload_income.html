{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <h2 class="card-title"><i class="fas fa-file-invoice-dollar"></i> Загрузить доходы Яндекс</h2>
                <form method="POST" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label class="form-label">Excel-файл с отчетом Yandex</label>
                        <input type="file" name="file" class="form-control" accept=".xlsx,.xls" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Загрузить и импортировать</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
