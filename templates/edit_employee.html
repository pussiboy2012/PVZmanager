{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm" style="border-radius: 28px;">
            <div class="card-header bg-transparent border-0 pt-4 px-4">
                <h4 class="mb-0 fw-semibold">
                    <i class="fas fa-user-edit text-primary me-2"></i>Редактирование сотрудника
                </h4>
            </div>
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('edit_employee', id=employee.id) }}">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Имя сотрудника</label>
                        <input type="text" name="name" class="form-control" value="{{ employee.name }}" required>
                    </div>
                    <div class="d-flex gap-2 justify-content-end">
                        <a href="{{ url_for('employees_page') }}" class="btn btn-light rounded-pill px-4">Отмена</a>
                        <button type="submit" class="btn btn-primary rounded-pill px-4">
                            <i class="fas fa-save me-1"></i> Сохранить
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
